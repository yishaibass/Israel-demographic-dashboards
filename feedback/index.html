<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-VE1ZYYW7TS"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-VE1ZYYW7TS');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הצעות ובקשות — לוחות מחוונים ישראל</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',system-ui,sans-serif;min-height:100vh;background:linear-gradient(160deg,#0f172a 0%,#1e293b 45%,#334155 100%);color:#e2e8f0;display:flex;flex-direction:column;align-items:center;padding:72px 20px 48px}
.hero{text-align:center;max-width:640px;margin-bottom:32px}
.hero h1{font-size:clamp(28px,5vw,40px);font-weight:800;color:#fff;margin-bottom:12px}
.hero p{font-size:clamp(15px,2.4vw,18px);color:#94a3b8;font-weight:300;line-height:1.6}
.formcard{background:#fff;color:#0f172a;border-radius:20px;padding:32px 30px;width:100%;max-width:600px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.field{margin-bottom:20px}
.field label{display:block;font-size:15px;font-weight:600;margin-bottom:8px;color:#1e293b}
.field label .req{color:#dc2626}
.field label .opt{color:#94a3b8;font-weight:400;font-size:13px}
.field input,.field textarea{width:100%;font-family:'Heebo',system-ui,sans-serif;font-size:15px;color:#0f172a;padding:12px 14px;border:1px solid #cbd5e1;border-radius:10px;background:#f8fafc;transition:border-color .15s,box-shadow .15s}
.field input:focus,.field textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15);background:#fff}
.field textarea{min-height:150px;resize:vertical;line-height:1.5}
.submit-btn{width:100%;font-family:'Heebo',system-ui,sans-serif;font-size:16px;font-weight:700;color:#fff;background:#2563eb;border:0;border-radius:12px;padding:14px;cursor:pointer;transition:background .2s,transform .1s}
.submit-btn:hover{background:#1d4ed8}
.submit-btn:active{transform:scale(.99)}
.submit-btn:disabled{background:#94a3b8;cursor:default}
.fb-error{display:none;margin-top:14px;color:#dc2626;font-size:14px;font-weight:500;text-align:center}
.fb-success{display:none;text-align:center;padding:24px 8px}
.fb-success .big{font-size:48px;margin-bottom:12px}
.fb-success h2{font-size:24px;font-weight:800;color:#0f172a;margin-bottom:8px}
.fb-success p{font-size:15px;color:#64748b;line-height:1.6}
footer{margin-top:40px;color:#64748b;font-size:13px;font-weight:300;text-align:center}
.hb-home-back{position:fixed;top:14px;left:14px;z-index:99999;background:#0f172a;color:#fff;padding:9px 16px;border-radius:999px;text-decoration:none;font-family:'Heebo',system-ui,-apple-system,sans-serif;font-size:14px;font-weight:600;box-shadow:0 4px 14px rgba(0,0,0,.28);display:inline-flex;align-items:center;gap:6px}
.hb-home-back .hb-lbl{display:inline}
@media(max-width:480px){.hb-home-back{padding:0;width:40px;height:40px;gap:0;justify-content:center;border-radius:50%;font-size:18px}.hb-home-back .hb-lbl{display:none}}
</style>
</head>
<body>
<div class="hero">
<h1>הצעות ובקשות</h1>
<p>יש לך רעיון, בקשה או משוב? נשמח לשמוע — מלא/י את הטופס והכול יגיע אליי ישירות.</p>
</div>
<div class="formcard">
<form id="fbform" action="https://formspree.io/f/mojgwgpv" method="POST">
  <div class="field">
    <label for="name">שם <span class="opt">(לא חובה)</span></label>
    <input type="text" id="name" name="name" autocomplete="name">
  </div>
  <div class="field">
    <label for="email">אימייל לחזרה <span class="opt">(לא חובה)</span></label>
    <input type="email" id="email" name="email" autocomplete="email">
  </div>
  <div class="field">
    <label for="message">ההצעה / הבקשה שלך <span class="req">*</span></label>
    <textarea id="message" name="message" required></textarea>
  </div>
  <button type="submit" class="submit-btn">שליחה</button>
  <div class="fb-error" id="fbError">אופס — משהו השתבש. נסה/י שוב או שלח/י מייל ל־yishaibass@gmail.com</div>
</form>
<div class="fb-success" id="fbSuccess">
  <div class="big">🙏</div>
  <h2>תודה! ההודעה נשלחה</h2>
  <p>קיבלנו את ההצעה שלך ונקרא אותה בהקדם.</p>
</div>
</div>
<footer>נבנה עם Claude · לוחות מחוונים ישראל</footer>
<a href="../index.html" class="hb-home-back" aria-label="חזרה לדף הבית">🏠<span class="hb-lbl">דף הבית</span></a>
<script>
(function(){
  var form = document.getElementById('fbform');
  var errBox = document.getElementById('fbError');
  var success = document.getElementById('fbSuccess');
  form.addEventListener('submit', async function(e){
    e.preventDefault();
    var btn = form.querySelector('.submit-btn');
    errBox.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'שולח…';
    try {
      var res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        form.style.display = 'none';
        success.style.display = 'block';
        if (typeof gtag === 'function') { gtag('event', 'feedback_submit'); }
      } else {
        btn.disabled = false;
        btn.textContent = 'שליחה';
        errBox.style.display = 'block';
      }
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'שליחה';
      errBox.style.display = 'block';
    }
  });
})();
</script>
</body>
</html>
